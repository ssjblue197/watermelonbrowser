name: Release

# Build WaterMelon Browser for all desktop platforms and publish a GitHub Release.
# The app's built-in auto-updater (src-tauri/src/app_auto_updater.rs) reads releases
# from https://api.github.com/repos/ssjblue197/watermelonbrowser/releases, so a normal
# GitHub Release with the bundled assets is all that is required — no Tauri updater
# signing key is needed (the updater downloads assets directly; it does not verify a
# Tauri update signature).
#
# Trigger: push a semver tag, e.g.  git tag v0.25.0 && git push origin v0.25.0
# The tag (vX.Y.Z) becomes BUILD_VERSION via build.rs, which the updater treats as a
# stable release. Keep the tag in sync with the "version" in src-tauri/tauri.conf.json.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            build-essential \
            file

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build watermelon-proxy sidecar
        shell: bash
        run: |
          cd src-tauri
          cargo build --release --bin watermelon-proxy --target ${{ matrix.target }}
          cd ..
          TARGET=${{ matrix.target }} node src-tauri/copy-proxy-binary.mjs

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Forces build.rs to mark this build as a stable release (BUILD_VERSION = v{version}).
          STABLE_RELEASE: "true"
          # The AppImage tooling (linuxdeploy and its plugins) are themselves
          # AppImages that need FUSE to mount; GitHub's ubuntu runners don't have
          # libfuse2, so without this they fail with "failed to run linuxdeploy".
          # Extract-and-run avoids FUSE entirely. Ignored on macOS/Windows.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
          # macOS ships UNSIGNED. Do NOT pass APPLE_* signing env vars: when they
          # are present (even as empty strings from unset secrets) the bundler
          # attempts `security import`, which fails with "failed to import
          # keychain certificate". To enable signing later, re-add the APPLE_*
          # vars and set the matching repository secrets.
        with:
          # On a tag push, github.ref_name is the tag (e.g. v0.25.0).
          tagName: ${{ github.ref_name }}
          releaseName: "WaterMelon Browser ${{ github.ref_name }}"
          releaseBody: "Automated release. Download the installer for your platform below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
