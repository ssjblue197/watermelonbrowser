[files]
extend-exclude = [
    "src-tauri/src/camoufox/data/*.json",
    "src-tauri/src/camoufox/data/*.xml",
    "src/i18n/locales/*.json",
    # Auto-generated from commit subjects by release.yml; typos here originate
    # in commit messages, which are immutable, so don't spell-check it.
    "CHANGELOG.md",
    # Vietnamese-language spec doc; English spellcheck produces only false positives.
    "SPEC.md",
    # Vietnamese-language engine analysis doc; same rationale as SPEC.md.
    # (extend-exclude only applies to directory walks like `typos .`; the
    # per-file pre-commit hook still needs the words below in extend-words.)
    "wayfern-engine-analysis.md",
]

[default.extend-words]
DBE = "DBE"
nd = "nd"
# Vietnamese words that collide with English typo patterns.
thi = "thi"
thay = "thay"
tham = "tham"
Tham = "Tham"
